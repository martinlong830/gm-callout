# Render Blueprint: https://render.com/docs/blueprint-spec
# After first deploy, set PUBLIC_BASE_URL in the dashboard to your service URL, e.g.
#   https://gm-callout.onrender.com
# (no trailing slash). Add all Twilio vars there — do not commit secrets.
# Required for manager/employee name sign-in (see docs/SUPABASE.md):
#   SUPABASE_URL, SUPABASE_ANON_KEY, SUPABASE_SERVICE_ROLE_KEY
# After deploy, open /health — portalSignInReady and browserReady must be true.
# Run once locally: node scripts/reset-portal-accounts.js (same Supabase project as Render).

services:
  - type: web
    name: gm-callout
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
